[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
extra_scripts = extra_script.py
check_tool = cppcheck
check_src_filters =
  +<include/*>
  +<modules/*>
  +<src/*>
check_flags =
  cppcheck: --enable=all --addon=misra --suppressions-list=.cppcheck_suppress.cfg --suppress=*:*.pio\* --std=c11